<!DOCTYPE html>
<html>
<head>
<title>UPSC Notices</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h2 style="margin:auto;">UPSC Notices</h2>
</header>

<section style="text-align:center; padding:40px;" id="authBox">

<h3>Dear Newaj, Please enter your password</h3>
<br>
<input type="password" id="upscPass" placeholder="Enter Password" style="padding:10px; width:200px;">
<br><br>
<button onclick="checkUPSC()" class="touch-btn">Submit</button>

</section>

<section id="upscContent" style="display:none; padding:20px;">

<div class="notice-card">
<a href="https://google.com" target="_blank">
<h3>UPSC Result</h3>
<p>Click to view result</p>
</a>
</div>

<br>

<div class="notice-card">
<a href="https://google.com" target="_blank">
<h3>UPSC Admit Card</h3>
<p>Click to download admit card</p>
</a>
</div>

</section>

<footer style="text-align:center; padding:20px;">
<a href="index.html">← Back to Home</a>
</footer>

<script>
function checkUPSC(){
var p=document.getElementById("upscPass").value;

if(p=="Newaj@12"){
document.getElementById("upscContent").style.display="block";
document.getElementById("authBox").style.display="none";
}else{
alert("Wrong Password");
}
}
</script>

</body>
</html>
